<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages serves 404.html for unknown routes.
      // Redirect back to the SPA entry with the original path preserved in query.
      var path = window.location.pathname.replace(
        /^\/Multimodal-AI-for-Healthcare-Applications/,
        "",
      );
      var search = window.location.search || "";
      var hash = window.location.hash || "";
      window.location.replace(
        "/Multimodal-AI-for-Healthcare-Applications/?p=" +
          encodeURIComponent(path + search + hash),
      );
    </script>
  </head>
  <body></body>
</html>
